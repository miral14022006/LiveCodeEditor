# ====================================
# Docker Compose — CodeSync Platform
# ====================================
#  ONE Dockerfile builds everything:
#    Backend + Frontend + All Language Runtimes
# ====================================

version: '3.8'

services:

  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7
    container_name: codesync-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: codesync
    networks:
      - codesync-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== CodeSync App (Backend + Frontend + Runtimes) ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codesync-app
    restart: unless-stopped
    ports:
      - "3000:80"     # Frontend (Nginx)
      - "8000:8000"   # Backend API + WebSocket
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017/codesync
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173,http://localhost
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-mySuperSecretAccessKey123456}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-mySuperSecretRefreshKey7891011}
    volumes:
      - execution_tmp:/tmp/code-execution
    networks:
      - codesync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ==================== Volumes ====================
volumes:
  mongodb_data:
    driver: local
  execution_tmp:
    driver: local

# ==================== Networks ====================
networks:
  codesync-network:
    driver: bridge
